<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Event Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
            font-family: Arial, sans-serif;
        }

        .gallery-title {
            font-size: 50px;
            font-weight: bold;
            color: #222;
        }

        .gallery-card {
            overflow: hidden;
            border: none;
            border-radius: 15px;
            transition: 0.4s;
        }

        .gallery-card:hover {
            transform: translateY(-10px);
        }

        .gallery-card img {
            height: 280px;
            object-fit: cover;
            transition: 0.5s;
        }

        .gallery-card:hover img {
            transform: scale(1.1);
        }

        .overlay-text {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 20px;
        }

        footer {
            background: #111;
            color: white;
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand fw-bold"
                href="index.html">

                CampusFest

            </a>

            <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                            href="index.html">

                            Home

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                            href="events.html">

                            Events

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active"
                            href="gallery.html">

                            Gallery

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                            href="registration.html">

                            Registration

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                            href="schedule.html">

                            Schedule

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                            href="contact.html">

                            Contact

                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Gallery Heading -->

    <section class="container py-5 text-center">

        <h1 class="gallery-title">
            Event Gallery
        </h1>

        <p class="lead mt-3">
            Explore unforgettable moments from CampusFest 2026
        </p>

    </section>

    <!-- Gallery Grid -->

    <section class="container pb-5">

        <div class="row g-4">

            <!-- Image 1 -->

            <div class="col-md-4">

                <div class="card gallery-card shadow position-relative">

                    <img src="https://images.unsplash.com/photo-1511578314322-379afb476865?q=80&w=1000&auto=format&fit=crop"
                        class="img-fluid">

                    <div class="overlay-text">
                        Cultural Night
                    </div>

                </div>

            </div>

            <!-- Image 2 -->

            <div class="col-md-4">

                <div class="card gallery-card shadow position-relative">

                    <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1000&auto=format&fit=crop"
                        class="img-fluid">

                    <div class="overlay-text">
                        Music Concert
                    </div>

                </div>

            </div>

            <!-- Image 3 -->

            <div class="col-md-4">

                <div class="card gallery-card shadow position-relative">

                    <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1000&auto=format&fit=crop"
                        class="img-fluid">

                    <div class="overlay-text">
                        Team Presentation
                    </div>

                </div>

            </div>

            <!-- Image 4 -->

            <div class="col-md-4">

                <div class="card gallery-card shadow position-relative">

                    <img src="https://images.unsplash.com/photo-1523580494863-6f3031224c94?q=80&w=1000&auto=format&fit=crop"
                        class="img-fluid">

                    <div class="overlay-text">
                        Campus Celebration
                    </div>

                </div>

            </div>

            <!-- Image 5 -->

            <div class="col-md-4">

                <div class="card gallery-card shadow position-relative">

                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1000&auto=format&fit=crop"
                        class="img-fluid">

                    <div class="overlay-text">
                        Hackathon Arena
                    </div>

                </div>

            </div>

            <!-- Image 6 -->

            <div class="col-md-4">

                <div class="card gallery-card shadow position-relative">

                    <img src="https://play-lh.googleusercontent.com/YJ4zQSbMd0xCsdVwwwjDwm4EPObsMQp-g93SuJDXUIQhzEVzWjpZ-9F1kg03ZBbWmDU"
                        class="img-fluid">

                    <div class="overlay-text">
                        Technical Quiz
                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="text-center py-3">

        <p class="mb-0">
            © 2026 CampusFest Gallery
        </p>

    </footer>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
