
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:
                linear-gradient(rgba(0, 0, 0, 0.5),
                    rgba(0, 0, 0, 0.5)),
                url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop');

            background-size: cover;
            background-position: center;
        }

        .register-box {
            background: white;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-7">

                <div class="register-box p-5 shadow">

                    <h2 class="text-center fw-bold mb-4">
                        Event Registration
                    </h2>

                    <form>

                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Roll Number</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Branch</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Mobile Number</label>
                            <input type="number" class="form-control">
                        </div>

                        <div class="mb-3">

                            <label>Select Event</label>

                            <select class="form-select">

                                <option>Technical Quiz</option>
                                <option>Hackathon</option>
                                <option>Poster Presentation</option>
                                <option>Coding Contest</option>
                                <option>Project Expo</option>
                                <option>Cultural Fest</option>

                            </select>

                        </div>

                        <button class="btn btn-success w-100">
                            REGISTER NOW
                        </button>

                    </form>

                   

                </div>

            </div>

        </div>

    </div>

</body>

</html>
